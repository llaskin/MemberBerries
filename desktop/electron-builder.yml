appId: com.axon.desktop
productName: Axon
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - electron/**/*
  - "!node_modules/**/{CHANGELOG.md,README.md,readme.md,LICENSE,license}"
  - "!node_modules/**/*.{ts,map}"
asar: false
icon: icon.png
mac:
  icon: icon.icns
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64, x64]
  hardenedRuntime: false
  extendInfo:
    NSDesktopFolderUsageDescription: "Axon reads your project files and developer memory (~/.axon) to provide context-aware briefings."
    NSDocumentsFolderUsageDescription: "Axon reads your project files and developer memory (~/.axon) to provide context-aware briefings."
    NSNetworkVolumesUsageDescription: "Axon needs access to read project files that may be on network or external volumes."
dmg:
  icon: icon.icns
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
win:
  target: nsis
linux:
  target: AppImage
